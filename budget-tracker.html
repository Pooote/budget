<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Budget</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
  :root {
    --bg: #0e0e12;
    --surface: #16161d;
    --surface2: #1e1e28;
    --border: #2a2a38;
    --accent: #7c6aff;
    --income: #b8ff6a;
    --expense: #ff6a9b;
    --text: #e8e8f0;
    --text2: #8888a8;
    --r: 14px;
    --r-sm: 9px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  [data-theme="forest"] {
    --bg: #0e0e12;
    --surface: #16161d;
    --surface2: #1e1e28;
    --border: #2a2a38;
    --accent: #4ade80;
    --income: #b8ff6a;
    --expense: #ff6a9b;
    --text: #e8e8f0;
    --text2: #8888a8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overscroll-behavior: none; }
  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
  }
  #syncStatus {
    position: fixed; top: 8px; right: 44px; z-index: 500;
    font-size: 0.65rem; color: var(--text2);
    display: flex; align-items: center; gap: 4px;
    transition: opacity 0.3s;
  }
  #themeToggle {
    position: fixed; top: 4px; right: 4px; z-index: 500;
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text2); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  #themeToggle:active { opacity: 0.7; }
  #syncDot { width: 6px; height: 6px; border-radius: 50%; background: var(--text2); transition: background 0.3s; }
  #syncDot.ok { background: var(--income); }
  #syncDot.syncing { background: #ffb86a; }
  #syncDot.err { background: var(--expense); }
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg);
    padding: 16px 16px 0;
    border-bottom: 1px solid var(--border);
  }
  .topbar-row {
    display: flex; align-items: center; justify-content: space-between;
    padding-bottom: 14px;
  }
  .logo { display: flex; align-items: center; gap: 8px; }
  .logo-mark {
    width: 30px; height: 30px; border-radius: 9px;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
  }
  .logo h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.02em; }
  .month-nav { display: flex; align-items: center; gap: 8px; }
  .month-btn {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r-sm); color: var(--text2);
    width: 30px; height: 30px; cursor: pointer;
    font-size: 14px; display: flex; align-items: center; justify-content: center;
  }
  .month-btn:active { opacity: 0.7; }
  .month-btn.disabled { opacity: 0.3; pointer-events: none; }
  #monthLabel {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem; color: var(--text2);
    min-width: 80px; text-align: center;
  }
  .switch-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .toggle-switch {
    flex: 1; position: relative;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 100px; padding: 3px;
    height: 30px; cursor: pointer; user-select: none;
  }
  .toggle-track { position: relative; display: flex; height: 100%; }
  .toggle-thumb {
    position: absolute; top: 0; left: 0;
    width: 50%; height: 100%;
    background: var(--surface2);
    border-radius: 100px;
    transition: transform 0.22s cubic-bezier(.4,0,.2,1), background 0.2s;
    z-index: 0;
  }
  .toggle-switch.right-active .toggle-thumb { transform: translateX(100%); }
  .toggle-labels { position: relative; z-index: 1; display: flex; width: 100%; height: 100%; }
  .toggle-label {
    flex: 1; display: flex; align-items: center; justify-content: center;
    font-size: 0.72rem; font-weight: 700; color: var(--text2);
    transition: color 0.2s; gap: 4px;
  }
  .toggle-switch#walletSwitch.left-active .toggle-label.left,
  .toggle-switch#walletSwitch.right-active .toggle-label.right { color: var(--text); }
  .toggle-switch#periodSwitch .toggle-label.active-label,
  .toggle-switch#periodSwitch.left-active .toggle-label.left,
  .toggle-switch#periodSwitch.right-active .toggle-label.right { color: var(--text); }
  .toggle-switch.left-active .toggle-thumb { transform: translateX(0); }
  #walletSwitch.left-active .toggle-thumb { background: rgba(124,106,255,0.22); }
  [data-theme="forest"] #walletSwitch.left-active .toggle-thumb { background: rgba(106,255,138,0.22); }
  #walletSwitch.right-active .toggle-thumb { background: rgba(184,255,106,0.18); }
  .summary {
    padding: 0 16px 16px;
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;
  }
  .sum-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r); padding: 12px;
  }
  .sum-label { font-size: 0.65rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 4px; }
  .sum-value { font-family: 'Space Mono', monospace; font-size: 1rem; font-weight: 700; }
  .sum-value.income { color: var(--income); }
  .sum-value.expense { color: var(--expense); }
  .sum-value.balance { color: var(--accent); }
  .tabs { display: flex; gap: 4px; padding: 0 16px 12px; }
  .tab {
    flex: 1; padding: 8px 4px; text-align: center;
    font-size: 0.8rem; font-weight: 500; color: var(--text2);
    cursor: pointer; border-radius: var(--r-sm);
    border: 1px solid transparent;
    transition: all 0.15s; user-select: none;
  }
  .tab.active { background: var(--surface2); color: var(--text); border-color: var(--border); }
  .scroll-area {
    flex: 1; overflow-y: auto; padding: 0 16px;
    padding-bottom: calc(80px + var(--safe-bottom));
    -webkit-overflow-scrolling: touch;
  }
  .panel { display: none; flex-direction: column; gap: 14px; padding-top: 4px; }
  .panel.active { display: flex; }
  .tx-group-label {
    font-size: 0.7rem; color: var(--text2); text-transform: uppercase;
    letter-spacing: 0.07em; margin-top: 4px; padding: 0 2px;
  }
  .tx-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r); padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    cursor: pointer; transition: border-color 0.15s;
  }
  .tx-card:active { border-color: var(--accent); }
  .tx-icon {
    width: 38px; height: 38px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
    background: var(--surface2);
  }
  .tx-info { flex: 1; min-width: 0; }
  .tx-name { font-weight: 600; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-cat { font-size: 0.72rem; color: var(--text2); margin-top: 2px; }
  .tx-right { text-align: right; flex-shrink: 0; }
  .tx-amount { font-family: 'Space Mono', monospace; font-size: 0.92rem; font-weight: 700; }
  .tx-amount.income { color: var(--income); }
  .tx-amount.expense { color: var(--expense); }
  .tx-date { font-size: 0.68rem; color: var(--text2); margin-top: 2px; }
  .budget-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r); padding: 14px 16px;
  }
  .budget-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; gap: 8px; }
  .budget-name { font-weight: 600; font-size: 0.9rem; display: flex; align-items: center; gap: 6px; min-width: 0; flex-shrink: 1; }
  .budget-nums {
    font-family: 'Space Mono', monospace; font-size: 0.72rem; color: var(--text2);
    text-align: right; flex-shrink: 0;
  }
  .budget-nums span { color: var(--text); }
  .budget-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .pct-pill {
    font-family: 'Space Mono', monospace; font-size: 0.7rem; font-weight: 700;
    padding: 3px 9px; border-radius: 100px;
    background: var(--surface2); flex-shrink: 0;
    min-width: 42px; text-align: center;
  }
  .pct-pill.ok { color: var(--income); }
  .pct-pill.warn { color: #ffb86a; }
  .pct-pill.over { color: var(--expense); }
  .bar-wrap { height: 7px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
  .bar-fill.ok { background: var(--income); }
  .bar-fill.warn { background: #ffb86a; }
  .bar-fill.over { background: var(--expense); }
  .analytics-section { display: flex; flex-direction: column; gap: 14px; }
  .donut-wrap {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r); padding: 16px;
  }
  .donut-title { font-size: 0.78rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 14px; }
  .donut-chart { display: flex; align-items: center; gap: 16px; }
  svg.donut { flex-shrink: 0; }
  .donut-legend { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .legend-item { display: flex; align-items: center; gap: 8px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend-label { font-size: 0.78rem; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .legend-pct { font-family: 'Space Mono', monospace; font-size: 0.72rem; color: var(--text2); }
  /* ── Category filter chips ── */
  .filter-row {
    display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px;
    -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-chip {
    flex-shrink: 0; padding: 6px 12px; border-radius: 100px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text2); font-size: 0.76rem; font-weight: 600;
    cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 4px;
    transition: all 0.15s; font-family: 'Space Grotesk', sans-serif;
  }
  .filter-chip.active { background: rgba(124,106,255,0.18); border-color: var(--accent); color: var(--accent); }
  /* ── Line graph ── */
  .line-wrap {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r); padding: 16px;
  }
  .line-title { font-size: 0.78rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 4px; }
  .line-total { font-family: 'Space Mono', monospace; font-size: 1.3rem; font-weight: 700; color: var(--text); margin-bottom: 14px; }
  .line-svg-wrap { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .line-svg-wrap::-webkit-scrollbar { display: none; }
  .line-point { cursor: pointer; }
  .line-tooltip {
    font-family: 'Space Mono', monospace; font-size: 9px; fill: var(--text2);
  }
  .empty { text-align: center; padding: 40px 20px; color: var(--text2); }
  .empty-icon { font-size: 2.2rem; margin-bottom: 10px; }
  .empty p { font-size: 0.85rem; }
  .loading { text-align: center; padding: 40px 20px; color: var(--text2); font-size: 0.85rem; }
  .fab {
    position: fixed; bottom: calc(16px + var(--safe-bottom)); right: 16px;
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--accent); border: none;
    color: #fff; font-size: 26px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(124,106,255,0.4);
    z-index: 200; transition: transform 0.15s;
  }
  .fab:active { transform: scale(0.92); }
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,0,0.7);
    align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px 20px 0 0; padding: 20px 20px calc(20px + var(--safe-bottom));
    width: 100%; max-width: 480px;
    animation: slideUp 0.22s ease;
    max-height: 86vh; overflow-y: auto;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-title { font-weight: 700; font-size: 1rem; margin-bottom: 18px; display: flex; align-items: center; justify-content: space-between; }
  .modal-close {
    background: var(--surface2); border: none;
    color: var(--text2); width: 28px; height: 28px;
    border-radius: 50%; cursor: pointer; font-size: 16px;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 0.75rem; color: var(--text2); margin-bottom: 5px; }
  .field input, .field select {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--r-sm); color: var(--text);
    font-family: 'Space Grotesk', sans-serif; font-size: 1rem;
    padding: 12px 14px; outline: none;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .type-toggle { display: flex; gap: 8px; }
  .type-btn {
    flex: 1; padding: 10px; border-radius: var(--r-sm);
    border: 1px solid var(--border); background: var(--bg);
    color: var(--text2); font-family: 'Space Grotesk', sans-serif;
    font-size: 0.9rem; font-weight: 600; cursor: pointer;
    transition: all 0.15s;
  }
  .type-btn.active.income-btn { background: rgba(184,255,106,0.15); border-color: var(--income); color: var(--income); }
  .type-btn.active.expense-btn { background: rgba(255,106,155,0.15); border-color: var(--expense); color: var(--expense); }
  .modal-actions { display: flex; gap: 10px; margin-top: 4px; }
  .btn {
    flex: 1; padding: 14px; border-radius: var(--r-sm);
    border: none; font-family: 'Space Grotesk', sans-serif;
    font-size: 0.95rem; font-weight: 700; cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn:active { opacity: 0.8; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-ghost { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
  .btn-danger { background: rgba(255,106,155,0.15); color: var(--expense); border: 1px solid rgba(255,106,155,0.3); }
  .budget-list-edit { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .budget-edit-row { display: flex; align-items: center; gap: 8px; }
  .budget-edit-row .cat-icon { font-size: 18px; width: 28px; text-align: center; flex-shrink: 0; }
  .budget-edit-row span { flex: 1; font-size: 0.88rem; }
  .budget-edit-row input {
    width: 90px; background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--r-sm); color: var(--text);
    font-family: 'Space Mono', monospace; font-size: 0.85rem;
    padding: 7px 10px; outline: none; text-align: right;
  }
  .budget-edit-row input:focus { border-color: var(--accent); }
</style>
</head>
<body>
<div id="syncStatus">
  <div id="syncDot"></div>
  <span id="syncText">connecting…</span>
</div>
<button id="themeToggle" onclick="toggleTheme()">🌲</button>

<div class="topbar">
  <div class="topbar-row">
    <div class="logo">
      <div class="logo-mark" id="logoMark">¥</div>
      <h1>Budget</h1>
    </div>
    <div class="month-nav">
      <button class="month-btn" id="prevMonthBtn" onclick="changeMonth(-1)">‹</button>
      <div id="monthLabel"></div>
      <button class="month-btn" id="nextMonthBtn" onclick="changeMonth(1)">›</button>
    </div>
  </div>

  <div class="switch-row">
    <div class="toggle-switch left-active" id="walletSwitch" onclick="cycleWallet()">
      <div class="toggle-track">
        <div class="toggle-thumb"></div>
        <div class="toggle-labels">
          <div class="toggle-label left">¥ Yen</div>
          <div class="toggle-label right">฿ Baht</div>
        </div>
      </div>
    </div>
    <div class="toggle-switch left-active" id="periodSwitch" onclick="cyclePeriod()">
      <div class="toggle-track">
        <div class="toggle-thumb"></div>
        <div class="toggle-labels">
          <div class="toggle-label left">This Month</div>
          <div class="toggle-label right">All Time</div>
        </div>
      </div>
    </div>
  </div>

  <div class="summary">
    <div class="sum-card">
      <div class="sum-label">Income</div>
      <div class="sum-value income" id="sumIncome">¥0</div>
    </div>
    <div class="sum-card">
      <div class="sum-label">Spent</div>
      <div class="sum-value expense" id="sumExpense">¥0</div>
    </div>
    <div class="sum-card">
      <div class="sum-label">Balance</div>
      <div class="sum-value balance" id="sumBalance">¥0</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('transactions')">Transactions</div>
    <div class="tab" onclick="switchTab('budgets')">Budgets</div>
    <div class="tab" onclick="switchTab('analytics')">Analytics</div>
  </div>
</div>

<div class="scroll-area">
  <div class="panel active" id="panel-transactions">
    <div id="txList"><div class="loading">Connecting to database…</div></div>
  </div>
  <div class="panel" id="panel-budgets">
    <div style="display:flex;justify-content:flex-end">
      <button class="btn btn-ghost" style="flex:none;padding:8px 14px;font-size:0.8rem;border-radius:var(--r-sm)" onclick="openBudgetModal()">Edit budgets</button>
    </div>
    <div id="budgetList"></div>
  </div>
  <div class="panel" id="panel-analytics">
    <div id="analyticsFilters" class="filter-row" style="margin-bottom:2px;"></div>
    <div id="analyticsContent"></div>
  </div>
</div>

<button class="fab" onclick="openAddModal()">+</button>

<div class="modal-overlay" id="addModal" onclick="closeAddModal(event)">
  <div class="modal">
    <div class="modal-title">
      <span id="addModalTitle">Add transaction</span>
      <button class="modal-close" onclick="closeAddModal()">✕</button>
    </div>
    <div class="field">
      <div class="type-toggle">
        <button class="type-btn expense-btn active" id="typeExpense" onclick="setType('expense')">↑ Expense</button>
        <button class="type-btn income-btn" id="typeIncome" onclick="setType('income')">↓ Income</button>
      </div>
    </div>
    <div class="field">
      <label>Description</label>
      <input type="text" id="txName" placeholder="e.g. Grocery run" maxlength="50" />
    </div>
    <div class="field">
      <label>Amount</label>
      <input type="number" id="txAmount" placeholder="0" min="0" inputmode="decimal" />
    </div>
    <div class="field">
      <label>Category</label>
      <select id="txCat"></select>
    </div>
    <div class="field">
      <label>Date</label>
      <input type="date" id="txDate" />
    </div>
    <div class="modal-actions" id="addModalActions">
      <button class="btn btn-ghost" onclick="closeAddModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveTransaction()">Save</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="budgetModal" onclick="closeBudgetModal(event)">
  <div class="modal">
    <div class="modal-title">
      <span>Monthly budgets</span>
      <button class="modal-close" onclick="closeBudgetModal()">✕</button>
    </div>
    <div class="budget-list-edit" id="budgetEditList"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeBudgetModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveBudgets()">Save</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, set, remove, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC5A7IyexkTnpDs0ZS1Gzq9HZRkiJEQWN4",
  authDomain: "budget-tracker-dc959.firebaseapp.com",
  databaseURL: "https://budget-tracker-dc959-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "budget-tracker-dc959",
  storageBucket: "budget-tracker-dc959.firebasestorage.app",
  messagingSenderId: "325571002459",
  appId: "1:325571002459:web:a10536686cfbe04a827f7e"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const WALLETS = {
  JPY: { symbol: '¥', txPath: 'transactions',      budgetPath: 'budgets' },
  THB: { symbol: '฿', txPath: 'transactions_thb',  budgetPath: 'budgets_thb' }
};
let currentWallet = 'JPY';
let currentPeriod = 'month';

const EXPENSE_CATS = [
  { id:'food',        name:'Food',          icon:'🥦' },
  { id:'shopping',    name:'Shopping',      icon:'🛍️' },
  { id:'transport',   name:'Transport',     icon:'🚲' },
  { id:'travel',      name:'Travel',        icon:'✈️' },
  { id:'utilities',   name:'Utilities',     icon:'⚡️' },
  { id:'furniture',   name:'Furniture',     icon:'🏠' },
  { id:'daily_used',  name:'Daily used',    icon:'📆' },
  { id:'gifts',       name:'Gifts',         icon:'🎁' },
  { id:'transfer_out',name:'Transfer out',  icon:'💸' },
  { id:'other',       name:'Other',         icon:'📦' },
];
const INCOME_CATS = [
  { id:'work',        name:'Work',        icon:'💼' },
  { id:'transfer_in', name:'Transfer in', icon:'💸' },
];
const ALL_CATS = [...EXPENSE_CATS, ...INCOME_CATS];
function catById(id) { return ALL_CATS.find(c => c.id === id) || { name: id, icon: '•' }; }

let walletData = {
  JPY: { transactions: {}, budgets: {} },
  THB: { transactions: {}, budgets: {} }
};
let currentType = 'expense';
let editingKey = null;
const now = new Date();
let viewYear  = now.getFullYear();
let viewMonth = now.getMonth();

function setSyncStatus(state, text) {
  const dot  = document.getElementById('syncDot');
  const label = document.getElementById('syncText');
  dot.className = state;
  label.textContent = text;
}

Object.entries(WALLETS).forEach(([wid, w]) => {
  onValue(ref(db, w.txPath), snap => {
    walletData[wid].transactions = snap.val() || {};
    setSyncStatus('ok', 'synced');
    renderAll();
  }, err => {
    setSyncStatus('err', 'offline');
    console.error(err);
  });
  onValue(ref(db, w.budgetPath), snap => {
    walletData[wid].budgets = snap.val() || {};
    renderAll();
  });
});

function monthKey(y, m) { return `${y}-${String(m+1).padStart(2,'0')}`; }
function currentMK() { return monthKey(viewYear, viewMonth); }
function fmt(n) {
  const sym = WALLETS[currentWallet].symbol;
  if (Math.abs(n) >= 10000) return sym + Math.round(n).toLocaleString();
  return sym + n.toFixed(0);
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function currentTx() { return walletData[currentWallet].transactions; }
function currentBudgets() { return walletData[currentWallet].budgets; }

function getFilteredTx() {
  const all = Object.entries(currentTx()).map(([key, t]) => ({ ...t, _key: key }));
  if (currentPeriod === 'all') return all.filter(t => t.date);
  const mk = currentMK();
  return all.filter(t => t.date && t.date.startsWith(mk));
}

window.cycleWallet = function() {
  const next = currentWallet === 'JPY' ? 'THB' : 'JPY';
  switchWalletInternal(next);
};
function switchWalletInternal(wid) {
  currentWallet = wid;
  const sw = document.getElementById('walletSwitch');
  sw.classList.toggle('left-active', wid === 'JPY');
  sw.classList.toggle('right-active', wid === 'THB');
  document.getElementById('logoMark').textContent = WALLETS[wid].symbol;
  renderAll();
}

window.cyclePeriod = function() {
  const next = currentPeriod === 'month' ? 'all' : 'month';
  switchPeriodInternal(next);
};
function switchPeriodInternal(p) {
  currentPeriod = p;
  const sw = document.getElementById('periodSwitch');
  sw.classList.toggle('left-active', p === 'month');
  sw.classList.toggle('right-active', p === 'all');
  const disable = p === 'all';
  document.getElementById('prevMonthBtn').classList.toggle('disabled', disable);
  document.getElementById('nextMonthBtn').classList.toggle('disabled', disable);
  renderAll();
}

function renderAll() {
  updateMonthLabel();
  updateSummary();
  renderTransactions();
  const activePanel = document.querySelector('.panel.active');
  if (!activePanel) return;
  const name = activePanel.id.replace('panel-', '');
  if (name === 'budgets')   renderBudgets();
  if (name === 'analytics') renderAnalytics();
}

function updateMonthLabel() {
  if (currentPeriod === 'all') {
    document.getElementById('monthLabel').textContent = 'All time';
    return;
  }
  const d = new Date(viewYear, viewMonth, 1);
  document.getElementById('monthLabel').textContent =
    d.toLocaleDateString('en-US', { month:'short', year:'2-digit' }).replace(' ', "'");
}

function updateSummary() {
  const txs = getFilteredTx();
  const income  = txs.filter(t => t.type==='income') .reduce((s,t) => s+t.amount, 0);
  const expense = txs.filter(t => t.type==='expense').reduce((s,t) => s+t.amount, 0);
  document.getElementById('sumIncome').textContent  = fmt(income);
  document.getElementById('sumExpense').textContent = fmt(expense);
  const bal = income - expense;
  const balEl = document.getElementById('sumBalance');
  balEl.textContent  = (bal < 0 ? '-' : '') + fmt(Math.abs(bal));
  balEl.style.color  = bal < 0 ? 'var(--expense)' : 'var(--accent)';
}

function renderTransactions() {
  const txs = getFilteredTx().slice().sort((a,b) => b.date.localeCompare(a.date));
  const el = document.getElementById('txList');
  if (!txs.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">💸</div><p>No transactions ${currentPeriod==='all'?'yet':'this month'}.<br>Tap + to add one.</p></div>`;
    return;
  }
  const groups = {};
  txs.forEach(t => { if (!groups[t.date]) groups[t.date]=[]; groups[t.date].push(t); });
  let html = '';
  Object.keys(groups).sort((a,b) => b.localeCompare(a)).forEach(date => {
    html += `<div class="tx-group-label">${formatDateLabel(date)}</div>`;
    groups[date].forEach(t => {
      const cat = catById(t.cat);
      html += `
        <div class="tx-card" onclick="window._editTx('${t._key}')">
          <div class="tx-icon">${cat.icon}</div>
          <div class="tx-info">
            <div class="tx-name">${escHtml(t.name)}</div>
            <div class="tx-cat">${cat.name}</div>
          </div>
          <div class="tx-right">
            <div class="tx-amount ${t.type}">${t.type==='income'?'+':'-'}${fmt(t.amount)}</div>
          </div>
        </div>`;
    });
  });
  el.innerHTML = html;
}

function formatDateLabel(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const td = new Date(); td.setHours(0,0,0,0);
  const diff = Math.round((td - d) / 86400000);
  if (currentPeriod === 'month') {
    if (diff === 0) return 'Today';
    if (diff === 1) return 'Yesterday';
  }
  return d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year: currentPeriod==='all' ? 'numeric' : undefined });
}

function renderBudgets() {
  const budgets = currentBudgets();
  const txs = getFilteredTx().filter(t => t.type==='expense');
  const el  = document.getElementById('budgetList');
  const hasBudgets = EXPENSE_CATS.some(c => budgets[c.id] > 0);
  if (!hasBudgets) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🎯</div><p>No budgets set yet.<br>Tap "Edit budgets" to set limits.</p></div>`;
    return;
  }
  // In All Time mode, scale each category's monthly limit by the number of
  // distinct months that have any expense data, so the bar reflects a
  // cumulative budget across the whole period instead of just one month's limit.
  let monthMultiplier = 1;
  if (currentPeriod === 'all') {
    const allExpenseDates = Object.values(currentTx())
      .filter(t => t.type === 'expense' && t.date)
      .map(t => t.date.slice(0,7));
    const distinctMonths = new Set(allExpenseDates);
    monthMultiplier = Math.max(distinctMonths.size - 1, 1);
  }
  let html = '';
  EXPENSE_CATS.forEach(cat => {
    const limit = budgets[cat.id] || 0;
    if (!limit) return;
    const scaledLimit = limit * monthMultiplier;
    const spent = txs.filter(t => t.cat===cat.id).reduce((s,t) => s+t.amount, 0);
    const rawPct = (spent/scaledLimit)*100;
    const pct   = Math.min(rawPct, 100);
    const pctDisplay = Math.round(rawPct);
    const barCls = rawPct < 70 ? 'ok' : rawPct < 90 ? 'warn' : 'over';
    html += `
      <div class="budget-card">
        <div class="budget-header">
          <div class="budget-name">${cat.icon} ${cat.name}</div>
          <div class="budget-right">
            <div class="budget-nums"><span>${fmt(spent)}</span> / ${fmt(scaledLimit)}</div>
            <span class="pct-pill ${barCls}">${pctDisplay}%</span>
          </div>
        </div>
        <div class="bar-wrap"><div class="bar-fill ${barCls}" style="width:${pct}%"></div></div>
      </div>`;
  });
  el.innerHTML = html || `<div class="empty"><p>No budgets set.</p></div>`;
}

let analyticsFilterCat = null; // null = all categories

function renderAnalyticsFilters() {
  const txs = getFilteredTx().filter(t => t.type==='expense');
  const el = document.getElementById('analyticsFilters');
  if (!txs.length) { el.innerHTML = ''; return; }
  const usedCatIds = [...new Set(txs.map(t => t.cat))];
  const chips = usedCatIds.map(id => catById(id));
  let html = `<div class="filter-chip ${analyticsFilterCat===null?'active':''}" onclick="window._setAnalyticsFilter(null)">All</div>`;
  chips.forEach(c => {
    const active = analyticsFilterCat === c.id;
    html += `<div class="filter-chip ${active?'active':''}" onclick="window._setAnalyticsFilter('${c.id}')">${c.icon} ${c.name}</div>`;
  });
  el.innerHTML = html;
}

window._setAnalyticsFilter = function(catId) {
  analyticsFilterCat = catId;
  renderAnalyticsFilters();
  renderAnalytics();
};

function renderLineGraph(txs) {
  // In "This Month" mode, plot one point per day.
  // In "All Time" mode, group into one point per month instead (avoids a huge crowded daily axis).
  let buckets = []; // list of { key, label }

  if (currentPeriod === 'month') {
    const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
    for (let d = 1; d <= daysInMonth; d++) {
      const key = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      buckets.push({ key, label: String(d) });
    }
  } else {
    const allDates = txs.map(t => t.date).sort();
    if (!allDates.length) return '';
    const start = new Date(allDates[0] + 'T00:00:00');
    const end = new Date(); end.setHours(0,0,0,0);
    const cursor = new Date(start.getFullYear(), start.getMonth(), 1);
    const endCursor = new Date(end.getFullYear(), end.getMonth(), 1);
    while (cursor <= endCursor) {
      const mk = `${cursor.getFullYear()}-${String(cursor.getMonth()+1).padStart(2,'0')}`;
      const label = cursor.toLocaleDateString('en-US', { month:'short', year:'2-digit' }).replace(' ',"'");
      buckets.push({ key: mk, label });
      cursor.setMonth(cursor.getMonth() + 1);
    }
  }

  const byBucket = {};
  txs.forEach(t => {
    const bucketKey = currentPeriod === 'month' ? t.date : t.date.slice(0,7);
    byBucket[bucketKey] = (byBucket[bucketKey]||0) + t.amount;
  });
  const values = buckets.map(b => byBucket[b.key] || 0);
  const total = values.reduce((s,v) => s+v, 0);
  const max = Math.max(...values, 1);

  const w = Math.max(buckets.length * (currentPeriod==='month' ? 26 : 52), 320);
  const h = 160, padTop = 14, padBottom = 24, padLeft = 38, padRight = 8;
  const chartH = h - padTop - padBottom;
  const chartW = w - padLeft - padRight;
  const stepX = chartW / Math.max(buckets.length - 1, 1);

  const points = values.map((v, i) => {
    const x = padLeft + i * stepX;
    const y = padTop + chartH - (v / max) * chartH;
    return { x, y, v, key: buckets[i].key, label: buckets[i].label };
  });

  const linePath = points.map((p,i) => `${i===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const areaPath = linePath + ` L${points[points.length-1].x.toFixed(1)},${padTop+chartH} L${points[0].x.toFixed(1)},${padTop+chartH} Z`;

  // Y-axis: amount gridlines + labels (0, mid, max)
  const yTicks = [0, max/2, max];
  const yGridLines = yTicks.map(v => {
    const y = padTop + chartH - (v / max) * chartH;
    return `<line x1="${padLeft}" y1="${y.toFixed(1)}" x2="${w-padRight}" y2="${y.toFixed(1)}" stroke="var(--border)" stroke-width="1" stroke-dasharray="2,3"/>
            <text x="${(padLeft-6).toFixed(1)}" y="${(y+3).toFixed(1)}" text-anchor="end" class="line-tooltip">${fmt(v)}</text>`;
  }).join('');

  // X-axis: labels shown every Nth point to avoid crowding
  const labelEvery = currentPeriod === 'month' ? Math.ceil(buckets.length / 8) : Math.max(Math.ceil(buckets.length / 8), 1);
  const labels = points.map((p,i) => {
    if (i % labelEvery !== 0 && i !== points.length-1) return '';
    return `<text x="${p.x.toFixed(1)}" y="${h-6}" text-anchor="middle" class="line-tooltip">${p.label}</text>`;
  }).join('');

  const dots = points.map(p => p.v > 0 ? `<circle class="line-point" cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3" fill="var(--accent)"><title>${p.label}: ${fmt(p.v)}</title></circle>` : '').join('');

  return `
    <div class="line-wrap">
      <div class="line-title">${currentPeriod==='month'?'Daily':'Monthly'} spending${analyticsFilterCat ? ' · ' + catById(analyticsFilterCat).name : ''}</div>
      <div class="line-total">${fmt(total)}</div>
      <div class="line-svg-wrap">
        <svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
          <defs>
            <linearGradient id="lineFade" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="var(--accent)" stop-opacity="0.35"/>
              <stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/>
            </linearGradient>
          </defs>
          ${yGridLines}
          <path d="${areaPath}" fill="url(#lineFade)" stroke="none"/>
          <path d="${linePath}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
          ${dots}
          ${labels}
        </svg>
      </div>
    </div>`;
}

function dateToStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function renderAnalytics() {
  renderAnalyticsFilters();
  let txs = getFilteredTx().filter(t => t.type==='expense');
  if (analyticsFilterCat) txs = txs.filter(t => t.cat === analyticsFilterCat);
  const el  = document.getElementById('analyticsContent');
  if (!txs.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📊</div><p>No expenses ${currentPeriod==='all'?'yet':'this month'}${analyticsFilterCat ? ' in this category' : ''}.</p></div>`;
    return;
  }

  const lineHtml = renderLineGraph(txs);

  const total = txs.reduce((s,t) => s+t.amount, 0);
  const bycat = {};
  txs.forEach(t => { bycat[t.cat] = (bycat[t.cat]||0) + t.amount; });
  const sorted = Object.entries(bycat).sort((a,b) => b[1]-a[1]);
  const COLORS = ['#7c6aff','#b8ff6a','#ff6a9b','#6ab8ff','#ffb86a','#6affda','#ff9f6a','#da6aff'];
  let offset = 0;
  const r = 54, cx = 70, cy = 70, circ = 2*Math.PI*r;
  let segments = '';
  sorted.forEach(([catId, amt], i) => {
    const dash = (amt/total)*circ;
    segments += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${COLORS[i%COLORS.length]}" stroke-width="18" stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${-offset}" />`;
    offset += dash;
  });
  const legendItems = sorted.map(([catId, amt], i) => {
    const cat = catById(catId);
    const pct = Math.round((amt/total)*100);
    return `<div class="legend-item">
      <div class="legend-dot" style="background:${COLORS[i%COLORS.length]}"></div>
      <div class="legend-label">${cat.icon} ${cat.name}</div>
      <div class="legend-pct">${pct}%</div>
    </div>`;
  }).join('');
  el.innerHTML = `
    <div class="analytics-section">
      ${lineHtml}
      <div class="donut-wrap">
        <div class="donut-title">Spending breakdown${analyticsFilterCat ? ' · ' + catById(analyticsFilterCat).name : ''}</div>
        <div class="donut-chart">
          <svg class="donut" width="140" height="140" viewBox="0 0 140 140" style="transform:rotate(-90deg)">
            <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--surface2)" stroke-width="18"/>
            ${segments}
          </svg>
          <div class="donut-legend">${legendItems}</div>
        </div>
      </div>
      ${sorted.map(([catId, amt], i) => {
        const cat = catById(catId);
        const pct = Math.round((amt/total)*100);
        return `<div class="budget-card">
          <div class="budget-header">
            <div class="budget-name" style="color:${COLORS[i%COLORS.length]}">${cat.icon} ${cat.name}</div>
            <div class="budget-nums"><span>${fmt(amt)}</span> · ${pct}%</div>
          </div>
          <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${COLORS[i%COLORS.length]}"></div></div>
        </div>`;
      }).join('')}
    </div>`;
}

window.switchTab = function(name) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['transactions','budgets','analytics'][i] === name);
  });
  document.querySelectorAll('.panel').forEach(p => {
    p.classList.toggle('active', p.id === `panel-${name}`);
  });
  if (name === 'budgets')   renderBudgets();
  if (name === 'analytics') renderAnalytics();
};

window.changeMonth = function(dir) {
  if (currentPeriod === 'all') return;
  viewMonth += dir;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  if (viewMonth < 0)  { viewMonth = 11; viewYear--; }
  renderAll();
};

window.openAddModal = function() {
  editingKey = null;
  document.getElementById('addModalTitle').textContent = 'Add transaction';
  setType('expense');
  document.getElementById('txName').value   = '';
  document.getElementById('txAmount').value = '';
  document.getElementById('txDate').value   = new Date().toISOString().slice(0,10);
  document.getElementById('addModalActions').innerHTML = `
    <button class="btn btn-ghost" onclick="closeAddModal()">Cancel</button>
    <button class="btn btn-primary" onclick="saveTransaction()">Save</button>
  `;
  document.getElementById('addModal').classList.add('open');
  setTimeout(() => document.getElementById('txName').focus(), 100);
};

window._editTx = function(key) {
  const t = currentTx()[key];
  if (!t) return;
  editingKey = key;
  document.getElementById('addModalTitle').textContent = 'Edit transaction';
  setType(t.type);
  document.getElementById('txName').value   = t.name;
  document.getElementById('txAmount').value = t.amount;
  document.getElementById('txCat').value    = t.cat;
  document.getElementById('txDate').value   = t.date;
  document.getElementById('addModalActions').innerHTML = `
    <button class="btn btn-danger" onclick="deleteCurrentTx()">Delete</button>
    <button class="btn btn-primary" onclick="saveTransaction()">Save</button>
  `;
  document.getElementById('addModal').classList.add('open');
};

window.closeAddModal = function(e) {
  if (e && e.target !== document.getElementById('addModal')) return;
  document.getElementById('addModal').classList.remove('open');
  editingKey = null;
};

window.setType = function(type) {
  currentType = type;
  document.getElementById('typeExpense').classList.toggle('active', type==='expense');
  document.getElementById('typeIncome').classList.toggle('active',  type==='income');
  const cats = type==='expense' ? EXPENSE_CATS : INCOME_CATS;
  const sel = document.getElementById('txCat');
  const prevVal = sel.value;
  sel.innerHTML = cats.map(c => `<option value="${c.id}">${c.icon} ${c.name}</option>`).join('');
  if (cats.some(c => c.id === prevVal)) sel.value = prevVal;
};

window.saveTransaction = async function() {
  const name   = document.getElementById('txName').value.trim();
  const amount = parseFloat(document.getElementById('txAmount').value);
  const cat    = document.getElementById('txCat').value;
  const date   = document.getElementById('txDate').value;
  if (!name || isNaN(amount) || amount <= 0 || !date) {
    alert('Please fill in all fields with a valid amount.');
    return;
  }
  const txPath = WALLETS[currentWallet].txPath;
  setSyncStatus('syncing', 'saving…');
  try {
    if (editingKey) {
      await update(ref(db, `${txPath}/${editingKey}`), { type: currentType, name, amount, cat, date });
    } else {
      await push(ref(db, txPath), { type: currentType, name, amount, cat, date });
    }
    setSyncStatus('ok', 'synced');
    document.getElementById('addModal').classList.remove('open');
    editingKey = null;
  } catch(err) {
    setSyncStatus('err', 'save failed');
    alert('Failed to save. Check your connection.');
    console.error(err);
  }
};

window.deleteCurrentTx = async function() {
  if (!editingKey) return;
  if (!confirm('Delete this transaction?')) return;
  const txPath = WALLETS[currentWallet].txPath;
  setSyncStatus('syncing', 'deleting…');
  try {
    await remove(ref(db, `${txPath}/${editingKey}`));
    setSyncStatus('ok', 'synced');
    document.getElementById('addModal').classList.remove('open');
    editingKey = null;
  } catch(err) {
    setSyncStatus('err', 'delete failed');
    console.error(err);
  }
};

window.openBudgetModal = function() {
  const budgets = currentBudgets();
  document.getElementById('budgetEditList').innerHTML = EXPENSE_CATS.map(c => `
    <div class="budget-edit-row">
      <div class="cat-icon">${c.icon}</div>
      <span>${c.name}</span>
      <input type="number" id="budget_${c.id}" placeholder="0" min="0" inputmode="decimal"
        value="${budgets[c.id] || ''}" />
    </div>`).join('');
  document.getElementById('budgetModal').classList.add('open');
};
window.closeBudgetModal = function(e) {
  if (e && e.target !== document.getElementById('budgetModal')) return;
  document.getElementById('budgetModal').classList.remove('open');
};
window.saveBudgets = async function() {
  const newBudgets = {};
  EXPENSE_CATS.forEach(c => {
    const val = parseFloat(document.getElementById(`budget_${c.id}`).value);
    if (val > 0) newBudgets[c.id] = val;
  });
  const budgetPath = WALLETS[currentWallet].budgetPath;
  setSyncStatus('syncing', 'saving…');
  try {
    await set(ref(db, budgetPath), newBudgets);
    setSyncStatus('ok', 'synced');
    document.getElementById('budgetModal').classList.remove('open');
  } catch(err) {
    setSyncStatus('err', 'save failed');
    console.error(err);
  }
};

setType('expense');
updateMonthLabel();

// ── Theme toggle ───────────────────────────────────────────────────────────────
let currentTheme = 'dark';
window.toggleTheme = function() {
  currentTheme = currentTheme === 'dark' ? 'forest' : 'dark';
  applyTheme();
};
function applyTheme() {
  if (currentTheme === 'forest') {
    document.documentElement.setAttribute('data-theme', 'forest');
    document.getElementById('themeToggle').textContent = '🌑';
  } else {
    document.documentElement.removeAttribute('data-theme');
    document.getElementById('themeToggle').textContent = '🌲';
  }
}
applyTheme();
